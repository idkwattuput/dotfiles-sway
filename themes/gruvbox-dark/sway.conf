# Base colors
set $dark0_hard    #1d2021
set $dark0         #282828
set $dark0_soft    #32302f

set $dark1         #3c3836
set $dark2         #504945
set $dark3         #665c54
set $dark4         #7c6f64

# Light colors
set $light0        #fbf1c7
set $light1        #ebdbb2
set $light2        #d5c4a1
set $light3        #bdae93
set $light4        #a89984

# Accent colors
set $bright_red    #fb4934
set $bright_green  #b8bb26
set $bright_yellow #fabd2f
set $bright_blue   #83a598
set $bright_purple #d3869b
set $bright_aqua   #8ec07c
set $bright_orange #fe8019

set $neutral_red    #cc241d
set $neutral_green  #98971a
set $neutral_yellow #d79921
set $neutral_blue   #458588
set $neutral_purple #b16286
set $neutral_aqua   #689d6a
set $neutral_orange #d65d0e

# ===============================
# Client Borders & Colors
# ===============================

# target                 title        bg          text        indicator      border
client.focused           $dark0       $bright_blue  $light1    $bright_yellow $bright_yellow
client.focused_inactive  $dark1       $dark3        $light2    $neutral_blue  $dark3
client.unfocused         $dark1       $dark2        $light4    $dark4         $dark2
client.urgent            $bright_red  $dark0        $bright_red $bright_yellow $bright_red
client.placeholder       $dark2       $dark0        $light4    $dark4         $dark2

client.background        $dark0

